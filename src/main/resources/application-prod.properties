# Production overrides - DB and Vault are on the same server (localhost)
spring.cloud.vault.uri=http://127.0.0.1:8200
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bublikstd?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Bind Spring Boot to localhost only - Nginx proxies externally
server.address=127.0.0.1

# Confirmation email links - Namecheap CDN handles HTTPS
app.base-url=https://bublikstudios.net

# Ollama runs on same server - localhost in prod
ollama.base-url=http://127.0.0.1:11434

# -- Logging --
# Vault: INFO so you see startup connection, not debug noise
logging.level.org.springframework.cloud.vault=INFO
logging.level.org.springframework.vault=INFO
logging.level.org.springframework.cloud.vault.config=INFO

# DB / Hibernate: quiet in prod
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=WARN
spring.jpa.show-sql=false

# App loggers: auth, admin, JWT, Vault startup
logging.level.org.crypto.aiproject.controller=INFO
logging.level.org.crypto.aiproject.security=INFO
logging.level.org.crypto.aiproject.config=INFO

# ? Actuator / Prometheus metrics (only accessible from 127.0.0.1 via nginx if needed)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

