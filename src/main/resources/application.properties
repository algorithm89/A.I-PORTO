spring.application.name=ai-backend

# ?? Import secrets from Vault ??
spring.config.import=optional:vault://

# ?? HashiCorp Vault ??
spring.cloud.vault.uri=http://152.53.210.206:8200
spring.cloud.vault.token=${VAULT_TOKEN:}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=ai-backend
spring.cloud.vault.fail-fast=false

# ?? MySQL ??
# spring.datasource.password ? from Vault: secret/ai-backend
spring.datasource.url=jdbc:mysql://152.53.210.206:3306/bublikstd?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=bublik
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?? JWT ??
# jwt.secret ? from Vault: secret/ai-backend
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ?? Mailtrap ??
# mailtrap.token ? from Vault: secret/ai-backend
mailtrap.from-email=mail@bublikstudios.net
mailtrap.from-name=BublikStudios

# ?? App config ??
app.base-url=http://localhost:8080

# ?? Logging (Vault debug) ??
logging.level.org.springframework.cloud.vault=DEBUG
logging.level.org.springframework.vault=DEBUG
logging.level.org.springframework.cloud.vault.config=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG
