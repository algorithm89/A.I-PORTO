# ── Grafana + Loki (deployed separately) ──
# Start:   docker compose -f grafana/docker-compose.yml up -d
# Logs:    docker compose -f grafana/docker-compose.yml logs -f

services:

  loki:
    image: grafana/loki:3.5.0
    container_name: ai-loki
    network_mode: host
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: ai-grafana
    network_mode: host
    environment:
      # Serve behind /grafana sub-path
      GF_SERVER_ROOT_URL: "https://bublikstudios.net/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_HTTP_PORT: "3100"
      # Disable signup, you'll create admin on first launch
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:


