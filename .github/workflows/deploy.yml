# ── Smart Deploy: only rebuild what changed ──
# Triggers on push to master, or manual "Run workflow" button
# Uses self-hosted runner on the production server
# Secrets needed in GitHub repo Settings > Secrets:
#   VAULT_TOKEN              - HashiCorp Vault token
#   PORTAINER_ADMIN_PASSWORD - Portainer admin password (first boot only)

name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy everything (backend + frontend + infra)'
        type: boolean
        default: true

jobs:
  # ── Step 1: Figure out what changed ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pom.xml'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'nginx.conf'

  # ── Step 2: Deploy only what changed ──
  deploy:
    name: Deploy
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.infra == 'true'
    runs-on: [self-hosted, bublik]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" > .env

      - name: Build Backend
        if: needs.changes.outputs.backend == 'true' || github.event.inputs.deploy_all == 'true'
        run: docker compose -f docker-compose.prod.yml build --no-cache backend

      - name: Build Frontend
        if: needs.changes.outputs.frontend == 'true' || github.event.inputs.deploy_all == 'true'
        run: docker compose -f docker-compose.prod.yml build --no-cache frontend

      - name: Deploy all services
        if: needs.changes.outputs.infra == 'true' || github.event.inputs.deploy_all == 'true'
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Restart Backend only
        if: needs.changes.outputs.backend == 'true' && needs.changes.outputs.infra != 'true' && github.event_name != 'workflow_dispatch'
        run: docker compose -f docker-compose.prod.yml up -d backend

      - name: Restart Frontend only
        if: needs.changes.outputs.frontend == 'true' && needs.changes.outputs.infra != 'true' && github.event_name != 'workflow_dispatch'
        run: docker compose -f docker-compose.prod.yml up -d frontend

      - name: Wait for startup
        run: sleep 10

      - name: Setup Portainer admin (first boot only)
        run: |
          curl -sk -X POST https://127.0.0.1:9443/api/users/admin/init \
            -H 'Content-Type: application/json' \
            -d '{"Username":"admin","Password":"${{ secrets.PORTAINER_ADMIN_PASSWORD }}"}' \
            && echo "[OK] Portainer admin created" \
            || echo "[SKIP] Portainer admin already exists"

      - name: Delete .env
        if: always()
        run: rm -f .env

      - name: Show status
        run: |
          echo "=== Container Status ==="
          docker compose -f docker-compose.prod.yml ps
          echo ""
          echo "=== Backend Logs (last 15 lines) ==="
          docker logs ai-backend --tail 15 2>&1 || true
          echo ""
          echo "=== Deploy Complete ==="
