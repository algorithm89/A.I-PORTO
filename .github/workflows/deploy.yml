# ── Smart Deploy: only rebuild what changed ──
# Triggers on push to master, or manual "Run workflow" button
# Uses self-hosted runner on the production server
# Secrets needed in GitHub repo Settings > Secrets:
#   VAULT_TOKEN - HashiCorp Vault token

name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy everything (backend + frontend + infra + grafana)'
        type: boolean
        default: true

jobs:
  # ── Step 1: Figure out what changed ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      grafana: ${{ steps.filter.outputs.grafana }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pom.xml'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'nginx.conf'
            grafana:
              - 'grafana/**'

  # ── Step 2: Deploy only what changed ──
  deploy:
    name: Deploy
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.grafana == 'true'
    runs-on: [self-hosted, bublik]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" > .env
          echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" >> .env

      - name: Build Backend
        if: needs.changes.outputs.backend == 'true' || github.event.inputs.deploy_all == 'true'
        run: docker compose -f docker-compose.prod.yml build --no-cache backend

      - name: Build Frontend
        if: needs.changes.outputs.frontend == 'true' || github.event.inputs.deploy_all == 'true'
        run: docker compose -f docker-compose.prod.yml build --no-cache frontend

      - name: Deploy all services
        if: needs.changes.outputs.infra == 'true' || github.event.inputs.deploy_all == 'true'
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Restart Backend only
        if: needs.changes.outputs.backend == 'true' && needs.changes.outputs.infra != 'true' && github.event_name != 'workflow_dispatch'
        run: docker compose -f docker-compose.prod.yml up -d backend

      - name: Restart Frontend only
        if: needs.changes.outputs.frontend == 'true' && needs.changes.outputs.infra != 'true' && github.event_name != 'workflow_dispatch'
        run: docker compose -f docker-compose.prod.yml up -d frontend

      - name: Restart Nginx (config changed)
        if: needs.changes.outputs.infra == 'true' && github.event_name != 'workflow_dispatch'
        run: docker compose -f docker-compose.prod.yml restart nginx

      # ── Grafana + Loki + Prometheus + cAdvisor + Node Exporter ──
      # Always ensure the stack is up (pull new images if grafana files changed)
      - name: Deploy Grafana stack
        if: needs.changes.outputs.grafana == 'true' || github.event.inputs.deploy_all == 'true'
        run: docker compose -f grafana/docker-compose.yml pull && docker compose -f grafana/docker-compose.yml up -d

      - name: Ensure Grafana stack is running
        if: needs.changes.outputs.grafana != 'true' && github.event.inputs.deploy_all != 'true'
        run: docker compose -f grafana/docker-compose.yml up -d --no-recreate

      - name: Wait for startup
        run: sleep 10

      - name: Delete .env
        if: always()
        run: rm -f .env

      - name: Show status
        run: |
          echo "=== Container Status ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
          echo ""
          echo "=== Grafana Stack ==="
          docker compose -f grafana/docker-compose.yml ps
          echo ""
          echo "=== Backend Logs (last 15 lines) ==="
          docker logs ai-backend --tail 15 2>&1 || true
          echo ""
          echo "=== Deploy Complete ==="
