# ── Smart Deploy: only rebuild what changed ──
# Triggers on push to master
# Uses self-hosted runner on the production server
# Secrets needed in GitHub repo Settings > Secrets:
#   VAULT_TOKEN  - HashiCorp Vault token

name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  # ── Step 1: Figure out what changed ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pom.xml'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'nginx.conf'

  # ── Step 2: Deploy only what changed ──
  deploy:
    name: Deploy
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" > .env

      - name: Build Backend
        if: needs.changes.outputs.backend == 'true'
        run: docker compose -f docker-compose.prod.yml build --no-cache backend

      - name: Build Frontend
        if: needs.changes.outputs.frontend == 'true'
        run: docker compose -f docker-compose.prod.yml build --no-cache frontend

      - name: Restart all (infra changed)
        if: needs.changes.outputs.infra == 'true'
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Restart Backend only
        if: needs.changes.outputs.backend == 'true' && needs.changes.outputs.infra != 'true'
        run: docker compose -f docker-compose.prod.yml up -d backend

      - name: Restart Frontend only
        if: needs.changes.outputs.frontend == 'true' && needs.changes.outputs.infra != 'true'
        run: docker compose -f docker-compose.prod.yml up -d frontend

      - name: Wait for startup
        run: sleep 10

      - name: Delete .env
        if: always()
        run: rm -f .env

      - name: Show status
        run: |
          echo "=== Container Status ==="
          docker compose -f docker-compose.prod.yml ps
          echo ""
          echo "=== Backend Logs (last 15 lines) ==="
          docker logs ai-backend --tail 15 2>&1 || true
          echo ""
          echo "=== Deploy Complete ==="
