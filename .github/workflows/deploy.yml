# ── Smart Deploy: only rebuild what changed ──
# Triggers on push to master
# Secrets needed in GitHub repo Settings > Secrets:
#   SERVER_HOST     - 152.53.210.206
#   SERVER_USER     - root (or your SSH user)
#   SERVER_SSH_KEY  - private SSH key for the server
#   VAULT_TOKEN     - HashiCorp Vault token

name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  # ── Step 1: Figure out what changed ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pom.xml'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'nginx.conf'

  # ── Step 2: Deploy only what changed ──
  deploy:
    name: Deploy
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.VAULT_TOKEN }}"
          echo "::add-mask::${{ secrets.SERVER_HOST }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BACKEND: ${{ needs.changes.outputs.backend }}
          DEPLOY_FRONTEND: ${{ needs.changes.outputs.frontend }}
          DEPLOY_INFRA: ${{ needs.changes.outputs.infra }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_BACKEND,DEPLOY_FRONTEND,DEPLOY_INFRA
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/bublik/A.I-PORTO"

            echo "=== BublikStudios Smart Deploy ==="
            echo "  Backend : $DEPLOY_BACKEND"
            echo "  Frontend: $DEPLOY_FRONTEND"
            echo "  Infra   : $DEPLOY_INFRA"
            echo "=================================="

            # Pull latest code
            if [ -d "$APP_DIR" ]; then
              cd "$APP_DIR"
              git pull origin master
            else
              git clone https://github.com/algorithm89/A.I-PORTO.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Create .env with Vault token
            echo "VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" > .env

            # Build only what changed
            SERVICES=""

            if [ "$DEPLOY_BACKEND" = "true" ]; then
              echo "[BUILD] Backend..."
              docker compose -f docker-compose.prod.yml build --no-cache backend
              SERVICES="$SERVICES backend"
            fi

            if [ "$DEPLOY_FRONTEND" = "true" ]; then
              echo "[BUILD] Frontend..."
              docker compose -f docker-compose.prod.yml build --no-cache frontend
              SERVICES="$SERVICES frontend"
            fi

            # If infra changed (nginx.conf, docker-compose), restart everything
            if [ "$DEPLOY_INFRA" = "true" ]; then
              echo "[INFRA] Config changed — restarting all services..."
              docker compose -f docker-compose.prod.yml up -d
            elif [ -n "$SERVICES" ]; then
              echo "[RESTART] Restarting:$SERVICES"
              docker compose -f docker-compose.prod.yml up -d $SERVICES
            fi

            # Wait for containers
            sleep 10

            # Delete .env — token is loaded into container env
            rm -f .env
            echo "[OK] .env deleted"

            # Status
            echo ""
            echo "=== Container Status ==="
            docker compose -f docker-compose.prod.yml ps

            if [ "$DEPLOY_BACKEND" = "true" ]; then
              echo ""
              echo "=== Backend Logs (last 15 lines) ==="
              docker logs ai-backend --tail 15 2>&1 || true
            fi

            echo ""
            echo "=== Deploy Complete ==="
