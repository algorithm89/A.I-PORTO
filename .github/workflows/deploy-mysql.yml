# ── Deploy MySQL (manual trigger only) ──
# Only runs when you manually trigger it from GitHub Actions tab
# Secrets needed:
#   MYSQL_ROOT_PASSWORD, MYSQL_DATABASE, MYSQL_USER_PASSWORD

name: Deploy MySQL

on:
  workflow_dispatch:

jobs:
  deploy-mysql:
    name: Deploy MySQL
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create MySQL .env
        working-directory: ./mysql
        run: |
          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER_PASSWORD=${{ secrets.MYSQL_USER_PASSWORD }}
          EOF

      - name: Start MySQL
        working-directory: ./mysql
        run: docker compose up -d

      - name: Wait for MySQL
        run: sleep 5

      - name: Delete .env
        if: always()
        working-directory: ./mysql
        run: rm -f .env

      - name: Show status
        run: |
          docker ps --filter name=bublik-mysql
          echo "=== MySQL Deploy Complete ==="
