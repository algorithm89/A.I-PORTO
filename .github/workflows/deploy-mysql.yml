# ── Deploy MySQL (manual trigger only) ──
# Only runs when you manually trigger it from GitHub Actions tab
# Secrets needed:
#   SERVER_HOST, SERVER_USER, SERVER_SSH_KEY
#   MYSQL_ROOT_PASSWORD, MYSQL_DATABASE, MYSQL_USER_PASSWORD

name: Deploy MySQL

on:
  workflow_dispatch:

jobs:
  deploy-mysql:
    name: Deploy MySQL
    runs-on: ubuntu-latest

    steps:
      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.MYSQL_ROOT_PASSWORD }}"
          echo "::add-mask::${{ secrets.MYSQL_USER_PASSWORD }}"
          echo "::add-mask::${{ secrets.SERVER_HOST }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/bublik/A.I-PORTO"
            cd "$APP_DIR/mysql"

            echo "=== MySQL Deploy ==="

            # Create .env for MySQL
            cat > .env <<EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER_PASSWORD=${{ secrets.MYSQL_USER_PASSWORD }}
            EOF

            docker compose up -d

            sleep 5

            rm -f .env
            echo "[OK] .env deleted"

            echo ""
            docker ps --filter name=bublik-mysql
            echo ""
            echo "=== MySQL Deploy Complete ==="

