# ── Portainer — deploy separately from app code ──
# Start:   docker compose up -d
# Stop:    docker compose down
# Logs:    docker logs ai-portainer -f
# Access:  https://<SERVER_IP>:9443

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: ai-portainer
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

volumes:
  portainer_data:



