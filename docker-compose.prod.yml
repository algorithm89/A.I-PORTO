# ── Production docker-compose (Linux server) ──
I wil# Code:          backend, frontend, nginx (rebuilt on deploy)
# Portainer:     see portainer/docker-compose.yml (deployed separately)
#
# Deploy code only:  docker compose -f docker-compose.prod.yml up --build -d --no-deps backend frontend && docker compose -f docker-compose.prod.yml restart nginx

services:

  # ═══════════════════════════════════
  # CODE (rebuilt on every deploy)
  # ═══════════════════════════════════

  backend:
    build: .
    container_name: ai-backend
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: prod
      VAULT_TOKEN: ${VAULT_TOKEN}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-frontend
    network_mode: host
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
