# ── Production docker-compose (Linux server) ──
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    network_mode: host
    environment:
      OLLAMA_HOST: "127.0.0.1:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  backend:
    build: .
    container_name: ai-backend
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: prod
      VAULT_TOKEN: ${VAULT_TOKEN}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-frontend
    network_mode: host
    environment:
      SERVE_HOST: "127.0.0.1"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:lts
    container_name: ai-portainer
    network_mode: host
    # Built-in HTTPS on port 9443 (self-signed cert)
    # Access at https://152.53.210.206:9443
    command: --bind-https 0.0.0.0:9443 --http-disabled
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

volumes:
  ollama_data:
  portainer_data:

