services:
  backend:
    build: .
    container_name: ai-backend
    ports:
      - "8080:8080"
    environment:
      VAULT_TOKEN: ${VAULT_TOKEN}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
